    let currentSet = [];
    let currentIndex = 0;

    function loadClass(classNum) {
        currentSet = allQuestions.filter(q => q.class === classNum);
        currentIndex = 0;
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentSet[currentIndex];
        const area = document.getElementById('quiz-area');
        
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            optionsHtml += `<button class="option" onclick="checkAnswer(this, ${idx}, ${q.correct}, '${q.rationale.replace(/'/g, "\'")}')">${opt}</button>`;
        });

        area.innerHTML = `
            <div class="question-card active">
                <h2>Clase ${q.class}</h2>
                <p><strong>${q.q}</strong></p>
                ${optionsHtml}
                <div class="rationale" id="rationale-box"></div>
            </div>
        `;
        
        document.getElementById('progress').innerText = `Pregunta ${currentIndex + 1} de ${currentSet.length}`;
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === currentSet.length - 1;
    }

    function checkAnswer(el, selected, correct, rationale) {
        const options = el.parentNode.querySelectorAll('.option');
        options.forEach(btn => btn.disabled = true);
        
        if(selected === correct) {
            el.classList.add('correct');
        } else {
            el.classList.add('incorrect');
            options[correct].classList.add('correct');
        }
        
        const rBox = document.getElementById('rationale-box');
        rBox.innerText = rationale;
        rBox.style.display = 'block';
    }

    function changeQuestion(dir) {
        currentIndex += dir;
        renderQuestion();
    }

    // Init
    loadClass(1);
</script>
