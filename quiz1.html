<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 4: Versión para Novatos</title>
    <style>
        :root {
            --primary: #4b6584;
            --accent: #20bf6b;
            --success: #26de81;
            --error: #eb3b5a;
            --bg: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #2f3542;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            max-width: 750px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; color: var(--primary); font-size: 24px; }
        .intro { text-align: center; color: #747d8c; margin-bottom: 30px; }

        .q-card {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            transition: 0.3s;
        }

        .q-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; display: block; }

        .btn-opt {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #dfe4ea;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
        }

        .btn-opt:hover { background: #f8f9fa; border-color: var(--primary); }
        .btn-opt.correct { background-color: #d1f7e1; border-color: var(--success); color: #0d5a35; }
        .btn-opt.incorrect { background-color: #ffdce0; border-color: var(--error); color: #842029; }

        .info-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #f1f2f6;
            display: none;
            font-size: 14px;
            border-left: 5px solid var(--primary);
        }

        .quote { display: block; margin-top: 10px; font-weight: bold; color: #57606f; }

        .footer { text-align: center; margin-top: 40px; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz 4: Conceptos Básicos</h1>
    <p class="intro">15 preguntas explicadas de forma sencilla para principiantes</p>

    <div id="quiz-area"></div>

    <div class="footer">
        <a href="index.html">← Volver al Inicio</a>
    </div>
</div>

<script>
    const questions = [
        {
            q: "1. (Fácil) Según David Byrne, ¿qué fue lo más importante que cambió con la grabación?",
            options: [
                { text: "A) Que la música dejó de ser algo que solo vivía en el aire para ser algo que podés guardar y volver a escuchar.", correct: true },
                { text: "B) Que los músicos ahora podían ganar dinero vendiendo entradas por internet.", correct: false }
            ],
            feedback: "Antes de los discos, si no estabas ahí para escuchar al músico, la música se perdía para siempre.",
            cite: "\"La música fue la principal metáfora poética de lo que no podía ser conservado\" (Byrne, 2019)."
        },
        {
            q: "2. (Fácil) ¿Qué significa que una grabación sea 'acústica' (antes de 1925)?",
            options: [
                { text: "A) Que se grababa sin electricidad, usando solo la fuerza del sonido para mover una aguja.", correct: true },
                { text: "B) Que se grababa en una habitación con mucha eco para que suene más fuerte.", correct: false }
            ],
            feedback: "En esa época no había micrófonos; tenías que cantar muy fuerte frente a un embudo gigante.",
            cite: "\"La escucha acústica dependía de la inscripción mecánica del sonido\" (Ospina Romero, 2024)."
        },
        {
            q: "3. (Fácil) ¿Cómo cambió la industria del disco en Argentina en los años 20?",
            options: [
                { text: "A) Dejaron de vender solo el 'aparato' (fonógrafo) y empezaron a vender a los artistas como 'estrellas' (como Gardel).", correct: true },
                { text: "B) Prohibieron la música extranjera para que solo se escuche folklore.", correct: false }
            ],
            feedback: "La industria entendió que era mejor negocio vender la fama de los artistas que solo las máquinas.",
            cite: "\"De las voces sin caras... a la consolidación de la industria discográfica\" (Cañardo, 2017)."
        },
        {
            q: "4. (Fácil) ¿Por qué a mucha gente le molesta el Auto-Tune según Lahiteau?",
            options: [
                { text: "A) Porque piensan que el artista está 'engañando' al público al no mostrar su voz real.", correct: true },
                { text: "B) Porque es un efecto que hace que la música suene muy baja de volumen.", correct: false }
            ],
            feedback: "Existe la idea de que la voz es lo más 'honesto' del ser humano y retocarla se siente como una trampa.",
            cite: "\"La voz se vuelve la medida de la honestidad de alguien... usar Auto-Tune es hacer trampa\" (Lahiteau, 2020)."
        },
        {
            q: "5. (Fácil) ¿Qué nos dice Mendívil sobre los medios de comunicación y la música?",
            options: [
                { text: "A) Que los medios inventan una 'forma de hablar' sobre la música para que nosotros la entendamos de cierta manera.", correct: true },
                { text: "B) Que la radio solo pasa música que le gusta a los dueños de las empresas.", correct: false }
            ],
            feedback: "Los discursos de los medios crean estrategias para que consumamos música de forma coherente.",
            cite: "\"Los discursos son estrategias para describir fenómenos de modo que sean recibidos como coherentes\" (Mendívil, 2016)."
        },
        {
            q: "6. (Medio) ¿Qué quería hacer Luigi Russolo con su orquesta de ruidos?",
            options: [
                { text: "A) Quería que la música usara ruidos de fábricas y máquinas para sonar como la vida moderna.", correct: true },
                { text: "B) Quería que los músicos hicieran menos ruido para que la gente no se asustara.", correct: false }
            ],
            feedback: "Para Russolo, el ruido era el nuevo material para crear la música del futuro.",
            cite: "\"Debemos conquistar la variedad infinita de los sonidos-ruidos\" (Russolo, 1913)."
        },
        {
            q: "7. (PREGUNTA DEL PROFESOR) ¿En qué se diferencia la música Concreta de la Electrónica?",
            options: [
                { text: "A) La Concreta usa sonidos reales grabados (como una puerta cerrándose); la Electrónica usa sonidos creados desde cero con máquinas.", correct: true },
                { text: "B) La Concreta se toca con instrumentos de madera; la Electrónica solo se toca con guitarras eléctricas.", correct: false }
            ],
            feedback: "La Concreta (París) parte de la realidad; la Electrónica (Colonia) parte de la síntesis pura.",
            cite: "\"Schaeffer trabajaba con el objeto sonoro grabado; Colonia con osciladores\" (Stubbs, 2019)."
        },
        {
            q: "8. (Medio) ¿Qué es el 'largo siglo XX' para Ana María Ochoa Gautier?",
            options: [
                { text: "A) Es el tiempo en el que las máquinas empezaron a capturar y reproducir todos los sonidos del mundo.", correct: true },
                { text: "B) Un siglo que fue muy aburrido porque no había internet.", correct: false }
            ],
            feedback: "Se refiere a cómo la invención del fonógrafo en 1877 cambió nuestra cultura sonora para siempre.",
            cite: "\"Tal vez acallando el ruido de la mirada logremos escuchar este largo siglo XX\" (Ochoa Gautier, 2006)."
        },
        {
            q: "9. (Medio) ¿Qué es el 'surco cerrado' en la historia de la música?",
            options: [
                { text: "A) Es cuando un disco se raya y repite el mismo pedacito de sonido (como un 'loop').", correct: true },
                { text: "B) Es una forma de guardar los discos para que no se llenen de tierra.", correct: false }
            ],
            feedback: "Este error técnico le dio a Pierre Schaeffer la idea de usar fragmentos repetidos para hacer música.",
            cite: "\"El surco cerrado le permitió a Schaeffer vislumbrar un nuevo modo de crear música\" (Stubbs, 2019)."
        },
        {
            q: "10. (Medio) ¿Por qué a los músicos de Alemania (Colonia) no les gustaba la música de Francia (Concreta)?",
            options: [
                { text: "A) Porque decían que usar ruidos de la calle era 'sucio' y ellos querían sonidos electrónicos puros.", correct: true },
                { text: "B) Porque no les gustaba el idioma francés en las canciones.", correct: false }
            ],
            feedback: "Había una rivalidad ideológica: realidad vs. pureza electrónica.",
            cite: "\"¿Quién querría tener algo que ver con los escombros de este mundo caído?\" (Stockhausen en Stubbs, 2019)."
        },
        {
            q: "11. (Difícil) ¿Qué es un 'Objeto Sonoro' según Fischerman?",
            options: [
                { text: "A) Es un sonido que escuchamos por lo que es (su textura, su brillo) y no por la nota que está tocando.", correct: true },
                { text: "B) Es cualquier instrumento musical que sea pesado, como un piano o una batería.", correct: false }
            ],
            feedback: "Es tratar al sonido como una cosa independiente de la melodía o el ritmo tradicional.",
            cite: "\"Una poética del sonido en sí mismo, entendido como objeto independiente\" (Fischerman, 2011)."
        },
        {
            q: "12. (Difícil) ¿Qué critica Adorno cuando habla de la 'regresión de la escucha'?",
            options: [
                { text: "A) Que la gente escucha música de forma pasiva, solo queriendo que el ritmo sea fácil y pegadizo.", correct: true },
                { text: "B) Que la gente está perdiendo el oído por escuchar música con auriculares muy fuerte.", correct: false }
            ],
            feedback: "Para Adorno, la industria nos acostumbra a música simple para que no pensemos ni critiquemos.",
            cite: "\"Adorno analizó el papel de la radio en la formación del gusto pop\" (Mendívil, 2016)."
        },
        {
            q: "13. (Difícil) Según Alex Ross, ¿qué pasó con la música experimental durante la Guerra Fría?",
            options: [
                { text: "A) Los gobiernos la usaron como una herramienta política para mostrar que en Occidente había 'libertad total'.", correct: true },
                { text: "B) Los músicos dejaron de experimentar porque tenían miedo de que les tiren una bomba.", correct: false }
            ],
            feedback: "La música más difícil y rara fue financiada para demostrar superioridad intelectual sobre los soviéticos.",
            cite: "\"Ideas grandiosas... acaban siendo pasto para una lucha de poder entre ideólogos\" (Ross, 2009)."
        },
        {
            q: "14. (Difícil) ¿Qué intentaba el 'Serialismo Integral'?",
            options: [
                { text: "A) Controlar matemáticamente todo: no solo las notas, sino también el volumen y cuánto dura cada sonido.", correct: true },
                { text: "B) Hacer que todas las canciones de un disco suenen exactamente igual de principio a fin.", correct: false }
            ],
            feedback: "Fue el nivel máximo de organización racional de la música después de la guerra.",
            cite: "\"Boulez establece doce valores de intensidad asociados con la serie\" (Brindle, 1996)."
        },
        {
            q: "15. (Difícil) ¿Cuál es la predicción de Brindle sobre el futuro de la música?",
            options: [
                { text: "A) Que el futuro dependerá más de los inventos tecnológicos (computadoras) que de nuevas teorías de composición.", correct: true },
                { text: "B) Que vamos a volver a tocar solo instrumentos de madera porque la electricidad se va a terminar.", correct: false }
            ],
            feedback: "Brindle cree que la tecnología es el verdadero motor del cambio musical actual.",
            cite: "\"Estará más asociado al cambio tecnológico que a transformaciones radicales en las técnicas\" (Brindle, 1996)."
        }
    ];

    const quizRoot = document.getElementById('quiz-area');

    function render() {
        questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <span class="q-text">${item.q}</span>
                ${item.options.map(opt => `
                    <button class="btn-opt" onclick="checkAnswer(this, ${opt.correct}, ${index})">${opt.text}</button>
                `).join('')}
                <div class="info-box" id="info-${index}">
                    ${item.feedback}
                    <span class="quote">${item.cite}</span>
                </div>
            `;
            quizRoot.appendChild(card);
        });
    }

    window.checkAnswer = (btn, isCorrect, idx) => {
        const parent = btn.parentElement;
        const options = parent.querySelectorAll('.btn-opt');
        const info = document.getElementById(`info-${idx}`);

        options.forEach(o => o.style.pointerEvents = 'none');

        if(isCorrect) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            options.forEach(o => { if(o.innerText.startsWith('A)')) o.classList.add('correct'); });
        }
        info.style.display = 'block';
    }

    render();
</script>

</body>
</html>
