<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Cuestionarios - UNQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .menu-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 30px; font-size: 24px; }
        .grid { display: grid; gap: 20px; }
        .card {
            text-decoration: none;
            background: #ffffff;
            border: 2px solid #e1e4e8;
            padding: 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: block;
        }
        .card:hover {
            border-color: #3498db;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(52,152,219,0.2);
        }
        .card h2 { margin: 0; font-size: 18px; color: #3498db; }
        .card p { margin: 10px 0 0; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>Panel de Estudios</h1>
    <div class="grid">
        <a href="quiz1.html" class="card">
            <h2>Quiz 1</h2>
            <p>Cuestionario extenso y explayado</p>
        </a>

        <a href="quiz2.html" class="card">
            <h2>Quiz 2</h2>
            <p>Cuestionario medio</p>
        </a>
        
        <a href="quiz3.html" class="card">
            <h2>Quiz 3</h2>
            <p>Cuestionario breve y concreto</p>
        </a>
    </div>
</div>

</body>
</html>
