<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 4: Integración Escalonada</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
        }

        .level-tag {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .easy { background: #d4edda; color: #155724; }
        .medium { background: #fff3cd; color: #856404; }
        .complex { background: #f8d7da; color: #721c24; }

        .question-block {
            margin-bottom: 40px;
            padding: 15px;
            border-left: 5px solid #eee;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .option {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .option:hover { background: #f9f9f9; border-color: var(--accent); }
        .option.correct { background: #d4edda; border-color: var(--success); }
        .option.incorrect { background: #f8d7da; border-color: var(--error); }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }

        .cite {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary);
            font-style: italic;
        }

        .nav-footer { text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cuestionario 4: Nivelación e Integración</h1>
        <p>De lo Analógico a la Vanguardia de Posguerra</p>
    </header>

    <div id="quiz-root"></div>

    <div class="nav-footer">
        <a href="index.html" style="color: var(--accent); font-weight: bold; text-decoration: none;">← Volver al Menú</a>
    </div>
</div>

<script>
    const quizData = [
        // NIVEL FÁCIL: Conceptos base
        {
            level: "easy",
            q: "1. (Clase 1) ¿Cuál es el cambio fundamental que introdujo la tecnología de grabación según David Byrne?",
            options: [
                { text: "A) Permitió que la música dejara de ser un evento puramente efímero para convertirse en un objeto que se puede conservar.", correct: true },
                { text: "B) Facilitó que los músicos pudieran tocar más rápido gracias a la edición digital de los años 20.", correct: false }
            ],
            feedback: "Antes de la grabación, la música solo existía en el aire y en el recuerdo del oyente.",
            cite: "\"La música fue la principal metáfora poética de lo que no podía ser conservado\" (Walter Murch en Byrne, 2019)."
        },
        {
            level: "easy",
            q: "2. (Clase 2) ¿Qué caracterizó a la industria discográfica en Argentina entre 1919 y 1930?",
            options: [
                { text: "A) El paso de la venta de 'aparatos' fonográficos a la creación de un mercado de 'estrellas' e identidades nacionales.", correct: true },
                { text: "B) La prohibición de grabar tangos para priorizar únicamente la música clásica europea.", correct: false }
            ],
            feedback: "La industria consolidó figuras populares como Gardel, transformando voces en identidades masivas.",
            cite: "\"De las voces sin caras... a la consolidación de la industria discográfica en la Argentina\" (Cañardo, 2017)."
        },
        {
            level: "easy",
            q: "3. (Clase 1) ¿Qué limitaba la 'escucha acústica' antes de la aparición del micrófono en 1925?",
            options: [
                { text: "A) La dependencia de la energía física del sonido para mover mecánicamente la aguja sobre el soporte.", correct: true },
                { text: "B) La falta de electricidad en los hogares, que impedía que los discos giraran a la velocidad correcta.", correct: false }
            ],
            feedback: "En la era acústica, los cantantes debían proyectar su voz directamente hacia un pabellón mecánico.",
            cite: "\"La fonografía se refiere a la inscripción del sonido y la mediación aural\" (Ospina Romero, 2024)."
        },

        // NIVEL MEDIO: Estética y Técnicas
        {
            level: "medium",
            q: "4. (Clase 3) ¿Qué proponía Russolo en su Manifiesto Futurista para renovar la música?",
            options: [
                { text: "A) Sustituir la orquesta tradicional por una 'orquesta de ruidos' que reflejara la vida moderna e industrial.", correct: true },
                { text: "B) Volver al silencio absoluto de la naturaleza para evitar la contaminación sonora de las ciudades.", correct: false }
            ],
            feedback: "Russolo clasificó los ruidos en seis familias para expandir el vocabulario musical.",
            cite: "\"Debemos romper este círculo restringido de sonidos puros y conquistar la variedad infinita de los sonidos-ruidos\" (Russolo, 1913)."
        },
        {
            level: "medium",
            q: "5. (Clase 3) ¿A qué se refiere Ana María Ochoa Gautier con el 'largo siglo XX'?",
            options: [
                { text: "A) Al periodo de hegemonía de la escucha mediada por máquinas que comienza con la invención del fonógrafo en 1877.", correct: true },
                { text: "B) A un siglo que parece más largo debido a la gran cantidad de obras musicales compuestas.", correct: false }
            ],
            feedback: "Propone que nuestra cultura está definida por el modo en que las máquinas han capturado y reproducido el sonido.",
            cite: "\"Tal vez acallando el ruido de la mirada logremos escuchar este largo siglo XX\" (Ochoa Gautier, 2006)."
        },
        {
            level: "medium",
            q: "6. (Clase 4) ¿Cuál fue el hallazgo accidental de Pierre Schaeffer que dio origen al 'arte de las tijeras'?",
            options: [
                { text: "A) El surco cerrado de un disco rayado, que permitía la repetición infinita de un fragmento sonoro.", correct: true },
                { text: "B) La invención de la cinta magnética mientras intentaba reparar un tocadiscos roto.", correct: false }
            ],
            feedback: "Este accidente permitió aislar el sonido de su contexto y convertirlo en un material maleable.",
            cite: "\"El surco cerrado le permitió a Schaeffer vislumbrar un nuevo modo de crear u obtener música\" (Stubbs, 2019)."
        },

        // PREGUNTA DEL PROFESOR
        {
            level: "medium",
            q: "7. (PREGUNTA DEL PROFESOR) Explique qué fue la música concreta, sus técnicas y diferencias/similitudes con la música electrónica.",
            options: [
                { text: "A) La Concreta (París) usa sonidos de la realidad manipulados; la Electrónica (Colonia) usa sonidos sintéticos generados por osciladores. Ambas usan el estudio como instrumento.", correct: true },
                { text: "B) La Concreta usa instrumentos de orquesta afinados; la Electrónica usa ruidos de la calle sin procesar. La diferencia es el uso del ritmo.", correct: false }
            ],
            feedback: "Ambas escuelas liberaron al sonido de su función tradicional, pero partían de fuentes opuestas (realidad vs. síntesis).",
            cite: "\"Rechazó la musique concrète... ¿quién querría tener algo que ver con la sustancia de este mundo caído?\" (Stockhausen en Stubbs, 2019)."
        },

        // NIVEL COMPLEJO: Teoría Crítica e Integración
        {
            level: "complex",
            q: "8. (Clase 5) ¿Cómo influyó la Guerra Fría en la música de vanguardia según Alex Ross?",
            options: [
                { text: "A) La vanguardia radical fue apoyada institucionalmente como un símbolo de libertad creativa frente al realismo socialista soviético.", correct: true },
                { text: "B) El conflicto obligó a los músicos a componer solo obras patrióticas para evitar ser perseguidos por el Estado.", correct: false }
            ],
            feedback: "Las instituciones occidentales financiaron el modernismo para demostrar superioridad cultural e intelectual.",
            cite: "\"Ideas grandiosas... acaban siendo pasto para una lucha de poder entre ideólogos y pedantes\" (Ross, 2009)."
        },
        {
            level: "complex",
            q: "9. (Clase 5) ¿Qué buscaba el Serialismo Integral de posguerra?",
            options: [
                { text: "A) Aplicar la lógica de la serie no solo a las notas, sino también a la intensidad, duración y el ataque del sonido.", correct: true },
                { text: "B) Crear una música que fuera fácil de cantar para que las masas pudieran integrarse a la nueva sociedad.", correct: false }
            ],
            feedback: "Fue el intento de lograr un control total y racional sobre cada aspecto de la composición.",
            cite: "\"Boulez establece doce valores de intensidad asociados con la serie numérica\" (Brindle, 1996)."
        },
        {
            level: "complex",
            q: "10. (Clase 1) ¿Qué es el 'carácter fetichista' de la música para Adorno?",
            options: [
                { text: "A) El hecho de que el oyente valora el éxito comercial o la técnica virtuosa de un artista por encima del valor artístico de la obra.", correct: true },
                { text: "B) La obsesión de los músicos por coleccionar instrumentos antiguos y raros.", correct: false }
            ],
            feedback: "Para Adorno, la industria cultural transforma la música en una mercancía que provoca una escucha pasiva.",
            cite: "\"Adorno analizó el papel de la radio en la formación del gusto pop al vincularla con determinantes sociales\" (Mendívil, 2016)."
        },
        {
            level: "complex",
            q: "11. (Clase 2) ¿Por qué el Auto-Tune genera irritación en ciertos sectores según Lahiteau?",
            options: [
                { text: "A) Porque rompe el pacto de 'honestidad' que asocia la voz humana natural con la verdad del artista.", correct: true },
                { text: "B) Porque es una tecnología muy cara que solo los artistas ricos pueden pagar.", correct: false }
            ],
            feedback: "La voz es vista como el último refugio de lo humano; alterarla se percibe como un engaño ético.",
            cite: "\"La voz se vuelve la medida de la honestidad de alguien... usar Auto-Tune es hacer trampa\" (Lahiteau, 2020)."
        },
        {
            level: "complex",
            q: "12. (Clase 3) ¿Qué define al 'objeto sonoro' en la música contemporánea según Fischerman?",
            options: [
                { text: "A) El sonido considerado en sí mismo, libre de sus relaciones tradicionales con la armonía o la melodía.", correct: true },
                { text: "B) Cualquier objeto físico que se pueda golpear para hacer ruido en el escenario.", correct: false }
            ],
            feedback: "Se trata de una poética donde el material sonoro es el protagonista absoluto del discurso.",
            cite: "\"Se abre un camino: el de una poética del sonido en sí mismo, entendido como objeto independiente\" (Fischerman, 2011)."
        },
        {
            level: "complex",
            q: "13. (Clase 4) ¿Cuál era la principal crítica de la escuela de Colonia hacia la música de Pierre Schaeffer?",
            options: [
                { text: "A) Que la música concreta estaba 'contaminada' por los escombros de la realidad, en lugar de ser puramente abstracta.", correct: true },
                { text: "B) Que la música concreta era demasiado difícil de grabar porque requería micrófonos muy costosos.", correct: false }
            ],
            feedback: "Eimert y Stockhausen buscaban una 'limpieza' sonora total mediante la síntesis electrónica.",
            cite: "\"¿Quién querría tener algo que ver con la sustancia de este mundo caído?\" (Stubbs, 2019)."
        },
        {
            level: "complex",
            q: "14. (Clase 1) ¿Qué relación establece Mendívil entre los medios y el discurso sobre la música?",
            options: [
                { text: "A) Que los medios no solo difunden música, sino que construyen estrategias discursivas para que el público la consuma de forma coherente.", correct: true },
                { text: "B) Que los medios son espejos perfectos que reflejan la realidad musical sin alterarla.", correct: false }
            ],
            feedback: "Siguiendo a Foucault, Mendívil explica cómo se fundan formas de describir y valorar el arte.",
            cite: "\"Los discursos no deben ser entendidos como nominación de fenómenos observables, sino como estrategias para describirlos\" (Mendívil, 2016)."
        },
        {
            level: "complex",
            q: "15. (Clase 5) ¿Cuál es la conclusión de Brindle sobre el futuro de la música?",
            options: [
                { text: "A) Que estará más ligado al desarrollo tecnológico que a nuevas teorías radicales de composición.", correct: true },
                { text: "B) Que la música dejará de existir para ser reemplazada por el teatro puro sin sonido.", correct: false }
            ],
            feedback: "Brindle observa que la tecnología ha superado a la teoría en su capacidad de transformar la música.",
            cite: "\"Estará más asociado al cambio y desarrollo tecnológico que a transformaciones radicales en las técnicas de composición\" (Brindle, 1996)."
        }
    ];

    const root = document.getElementById('quiz-root');

    function render() {
        quizData.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'question-block';
            div.innerHTML = `
                <div class="level-tag ${item.level}">${item.level === 'easy' ? 'Fácil' : item.level === 'medium' ? 'Intermedio' : 'Complejo'}</div>
                <span class="question-text">${item.q}</span>
                ${item.options.map(opt => `
                    <button class="option" onclick="evalu(this, ${opt.correct}, ${idx})">${opt.text}</button>
                `).join('')}
                <div class="feedback" id="f-${idx}">
                    ${item.feedback}
                    <span class="cite">${item.cite}</span>
                </div>
            `;
            root.appendChild(div);
        });
    }

    window.evalu = (btn, isCorrect, idx) => {
        const parent = btn.parentElement;
        const options = parent.querySelectorAll('.option');
        const feed = document.getElementById(`f-${idx}`);
        
        options.forEach(o => o.style.pointerEvents = 'none');
        
        if(isCorrect) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            options.forEach(o => { if(o.innerText.startsWith('A)')) o.classList.add('correct'); });
        }
        feed.style.display = 'block';
    }

    render();
</script>

</body>
</html>
