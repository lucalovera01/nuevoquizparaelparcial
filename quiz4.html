<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 4: Integración Total (15 preguntas)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }

        .question-block {
            margin-bottom: 35px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fff;
        }

        .question-text { font-weight: bold; font-size: 17px; margin-bottom: 15px; display: block; line-height: 1.4; }

        .option {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .option:hover { border-color: var(--accent); background-color: #f0f7ff; }

        .option.correct { background-color: #d4edda; border-color: var(--success); color: #155724; }

        .option.incorrect { background-color: #f8d7da; border-color: var(--error); color: #721c24; }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-left: 4px solid var(--accent);
            background: #f1f8ff;
            display: none;
            font-size: 14px;
        }

        .cita { display: block; margin-top: 8px; font-style: italic; font-weight: bold; color: #333; }

        .nav-footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .nav-footer a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cuestionario 4: Integración Final</h1>
    <p style="text-align: center; color: #666;">Repaso unificado de las Clases 1 a 5</p>

    <div id="quiz-content"></div>

    <div class="nav-footer">
        <a href="index.html">← Volver al Menú Principal</a>
    </div>
</div>

<script>
    const questions = [
        {
            q: "1. (Clase 4) Explique qué fue la música concreta, sus técnicas y diferencias con la electrónica de Colonia.",
            options: [
                { text: "A) La concreta usa sonidos grabados de la realidad (objetos sonoros) y montaje de cintas; la electrónica usa sonidos sintéticos generados por osciladores.", correct: true },
                { text: "B) La concreta se basa en la síntesis digital de sonidos, mientras que la electrónica de Colonia usa instrumentos orquestales grabados.", correct: false }
            ],
            feedback: "La música concreta trabaja con el 'objeto sonoro' preexistente, mientras que Colonia buscaba la pureza de la síntesis.",
            cite: "\"El surco cerrado le permitió a Schaeffer vislumbrar un nuevo modo de crear u obtener música\" (Stubbs, 2019)."
        },
        {
            q: "2. (Clase 1/2) ¿Cómo se relaciona la 'Industria Cultural' de Adorno con el debate actual sobre el Auto-Tune?",
            options: [
                { text: "A) El Auto-Tune es visto como una herramienta de estandarización técnica que, según la lógica de Adorno, erosiona la autonomía y veracidad del artista.", correct: true },
                { text: "B) Adorno consideraba que cualquier avance tecnológico en los medios masivos garantizaba la libertad absoluta del oyente.", correct: false }
            ],
            feedback: "La estandarización del gusto es un eje central en la crítica de Adorno a la música popular.",
            cite: "\"La voz se vuelve la medida de la honestidad de alguien... usar Auto-Tune parece suscitar una especial irritación\" (Lahiteau, 2020)."
        },
        {
            q: "3. (Clase 3/4) ¿Qué conexión existe entre el Manifiesto de Russolo y la música concreta de Schaeffer?",
            options: [
                { text: "A) Ambos buscaban expandir el material musical incluyendo el ruido y los sonidos del entorno como objetos estéticos válidos.", correct: true },
                { text: "B) Russolo rechazaba los ruidos industriales, prefiriendo la pureza de los instrumentos que luego usaría la música concreta.", correct: false }
            ],
            feedback: "Russolo fue el precursor ideológico de integrar el ruido, lo cual Schaeffer concretó técnicamente mediante la grabación.",
            cite: "\"Debemos romper este círculo restringido de sonidos puros y conquistar la variedad infinita de los sonidos-ruidos\" (Russolo, 1913)."
        },
        {
            q: "4. (Clase 5) ¿Por qué Alex Ross afirma que la música de vanguardia se convirtió en 'política' tras la 2da Guerra Mundial?",
            options: [
                { text: "A) Porque las instituciones financiaron el modernismo radical como un símbolo de libertad intelectual en el contexto de la Guerra Fría.", correct: true },
                { text: "B) Porque los compositores dejaron de experimentar para escribir himnos que fueran fáciles de entender por las masas trabajadoras.", correct: false }
            ],
            feedback: "La música experimental fue utilizada por Occidente para demostrar superioridad cultural frente al bloque soviético.",
            cite: "\"Ideas grandiosas... acaban siendo pasto para una lucha de poder entre ideólogos y pedantes\" (Ross, 2009)."
        },
        {
            q: "5. (Clase 1) Según David Byrne, ¿cómo afectó la tecnología analógica a nuestra percepción de la música?",
            options: [
                { text: "A) La grabación permitió que la música dejara de ser un evento efímero y se convirtiera en un objeto que se puede estudiar y repetir.", correct: true },
                { text: "B) La tecnología analógica hizo que la música fuera menos objetiva que la experiencia de un concierto en vivo.", correct: false }
            ],
            feedback: "Antes de la grabación, la música era inasible y solo quedaba en el recuerdo; la tecnología cambió nuestra manera de escuchar.",
            cite: "\"La música fue la principal metáfora poética de lo que no podía ser conservado\" (Walter Murch en Byrne, 2019)."
        },
        {
            q: "6. (Clase 3) ¿Qué significa el concepto de 'largo siglo XX' propuesto por Ana María Ochoa Gautier?",
            options: [
                { text: "A) Un periodo marcado por la hegemonía de la escucha mediada por máquinas que comenzó con la invención del fonógrafo en 1877.", correct: true },
                { text: "B) Un siglo que se extendió cronológicamente debido a que las guerras mundiales detuvieron el avance tecnológico.", correct: false }
            ],
            feedback: "Este concepto desplaza la mirada hacia lo acústico y reconoce la influencia de la región sonora en la cultura.",
            cite: "\"Tal vez acallando el ruido de la mirada logremos escuchar este largo siglo XX\" (Ochoa Gautier, 2006)."
        },
        {
            q: "7. (Clase 2) En la industria discográfica argentina (1919-1930), ¿cuál fue el rol de la 'voz sin cara'?",
            options: [
                { text: "A) Los primeros discos se centraban en el sonido puro; la imagen del artista (como Gardel) se volvió central recién con el desarrollo del marketing.", correct: true },
                { text: "B) Los artistas grababan con máscaras para mantener el misterio y evitar que la industria cultural controlara su imagen.", correct: false }
            ],
            feedback: "La industria pasó de vender 'aparatos' a vender 'estrellas' e identidades nacionales.",
            cite: "\"De las voces sin caras... a la consolidación de la industria discográfica en Argentina\" (Cañardo, 2017)."
        },
        {
            q: "8. (Clase 4) ¿Cuál fue el aporte fundamental de Pierre Stockhausen en el estudio de Colonia?",
            options: [
                { text: "A) El control total sobre cada parámetro del sonido (timbre, duración, altura) mediante la síntesis aditiva de ondas senoidales.", correct: true },
                { text: "B) La recuperación de la improvisación jazzística como método principal para crear música electrónica.", correct: false }
            ],
            feedback: "Stockhausen buscaba alejarse de los sonidos 'contaminados' de la realidad, prefiriendo la construcción desde cero.",
            cite: "\"Rechazó la musique concrète... ¿quién querría tener algo que ver con la sustancia de este mundo caído?\" (Stubbs, 2019)."
        },
        {
            q: "9. (Clase 3) ¿Qué es el 'objeto sonoro' para la musicología contemporánea influenciada por Fischerman?",
            options: [
                { text: "A) El sonido entendido como un fenómeno independiente de sus relaciones funcionales tradicionales (como la armonía o el ritmo).", correct: true },
                { text: "B) Cualquier instrumento musical que haya sido construido antes de la invención de la electricidad.", correct: false }
            ],
            feedback: "Se trata de una poética del sonido en sí mismo, donde el material es lo que importa.",
            cite: "\"Se abre un nuevo camino: el de una poética del sonido en sí mismo, entendido como objeto independiente\" (Fischerman, 2011)."
        },
        {
            q: "10. (Clase 1) ¿Qué diferencia a la 'escucha acústica' de la 'grabación sonora' antes de 1925 según Ospina Romero?",
            options: [
                { text: "A) La escucha acústica era mecánica (sin electricidad), limitada por la capacidad física de los pabellones para captar vibraciones.", correct: true },
                { text: "B) La grabación antes de 1925 ya era digital, pero se guardaba en soportes de cera para abaratar costos.", correct: false }
            ],
            feedback: "La era acústica dependía totalmente de la energía física del sonido para mover la aguja grabadora.",
            cite: "\"La fonografía se refiere a la inscripción del sonido y la mediación aural\" (Ospina Romero, 2024)."
        },
        {
            q: "11. (Clase 5) ¿Qué buscaba el 'Serialismo Integral' respecto a la composición tradicional?",
            options: [
                { text: "A) Extender la lógica de la serie dodecafónica a todos los parámetros: intensidad, duración y ataque.", correct: true },
                { text: "B) Volver a la música tonal para que el público de posguerra pudiera disfrutar de melodías simples.", correct: false }
            ],
            feedback: "Fue el punto máximo del control racional sobre la materia sonora en la posguerra.",
            cite: "\"Boulez establece doce valores de intensidad asociados con la serie numérica\" (Brindle, 1996)."
        },
        {
            q: "12. (Clase 2) ¿Por qué Lahiteau asocia la 'autenticidad' con un estilo?",
            options: [
                { text: "A) Porque lo que percibimos como 'auténtico' es en realidad una construcción estética que cambia con la tecnología disponible.", correct: true },
                { text: "B) Porque la única música auténtica es la que se graba sin micrófonos en un entorno natural.", correct: false }
            ],
            feedback: "La autenticidad es un pacto entre el artista y el público, a menudo mediado por el estilo de producción.",
            cite: "\"La autenticidad es un estilo. Y es siempre el mismo estilo\" (Neil Tennant en Lahiteau, 2020)."
        },
        {
            q: "13. (Clase 1/3) ¿Qué critica Adorno sobre el 'carácter fetichista' de la música en los medios?",
            options: [
                { text: "A) Que el oyente consume la música como una mercancía, valorando el 'éxito' o la técnica por encima de la experiencia artística profunda.", correct: true },
                { text: "B) Que los instrumentos musicales se han vuelto demasiado caros para que la gente común pueda comprarlos.", correct: false }
            ],
            feedback: "Para Adorno, la música en los medios masivos fomenta una 'regresión de la escucha'.",
            cite: "\"Adorno analizó el papel de la radio en la formación del gusto pop al vincularla con determinantes sociales\" (Mendívil, 2016)."
        },
        {
            q: "14. (Clase 4) ¿Cuál fue el impacto del descubrimiento del 'surco cerrado' en la música contemporánea?",
            options: [
                { text: "A) Sentó las bases para el concepto de 'loop' y repetición que luego usarían el minimalismo y el hip-hop.", correct: true },
                { text: "B) Hizo que la gente dejara de comprar discos de vinilo porque se rayaban con demasiada facilidad.", correct: false }
            ],
            feedback: "El accidente de Schaeffer permitió separar el sonido de su contexto narrativo.",
            cite: "\"Le permitió vislumbrar un modo de crear música más allá de la ortodoxia narrativa\" (Stubbs, 2019)."
        },
        {
            q: "15. (Clase 5) ¿Qué cambio tecnológico marca el futuro de la música según Reginald Smith Brindle?",
            options: [
                { text: "A) El desarrollo de la música por computación y la integración de la inteligencia artificial en los procesos de síntesis.", correct: true },
                { text: "B) La prohibición de los instrumentos electrónicos para volver a las orquestas de cámara del siglo XVIII.", correct: false }
            ],
            feedback: "Brindle concluye que el futuro está más asociado al cambio tecnológico que a nuevas teorías de composición.",
            cite: "\"Estará más asociado al desarrollo tecnológico que a transformaciones radicales en las técnicas de composición\" (Brindle, 1996)."
        }
    ];

    const quizContainer = document.getElementById('quiz-content');

    function renderQuiz() {
        questions.forEach((q, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.innerHTML = `
                <span class="question-text">${q.q}</span>
                ${q.options.map((opt, i) => `
                    <button class="option" onclick="handleCheck(this, ${opt.correct}, ${index})">
                        ${opt.text}
                    </button>
                `).join('')}
                <div class="feedback" id="feedback-${index}">
                    ${q.feedback}
                    <span class="cita">${q.cite}</span>
                </div>
            `;
            quizContainer.appendChild(block);
        });
    }

    window.handleCheck = function(btn, isCorrect, qIndex) {
        const parent = btn.parentElement;
        const options = parent.querySelectorAll('.option');
        const feedback = document.getElementById(`feedback-${qIndex}`);

        options.forEach(opt => opt.style.pointerEvents = 'none');

        if (isCorrect) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            options.forEach(opt => {
                if (opt.innerText.includes('A)') && qIndex !== 6) { /* Lógica visual simple */ }
            });
        }
        feedback.style.display = 'block';
    }

    renderQuiz();
</script>

</body>
</html>
